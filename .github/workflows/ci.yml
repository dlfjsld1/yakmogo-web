name: Web CI

on:
  push:
    branches:
      - enhancement
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - enhancement
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test when available
        run: npm test --if-present

      - name: Build
        run: npm run build
